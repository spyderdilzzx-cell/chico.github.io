<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sistem Kasir</title>
<style>
:root{
  --bg:#0b0f19;
  --panel:#121826;
  --panel2:#0f1524;
  --text:#eaf0ff;
  --muted:#9aa7c0;
  --line:rgba(255,255,255,.08);
  --accent:#4f8cff;
  --accent2:#7c4dff;
  --good:#1fc97f;
  --bad:#ff5d6c;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:radial-gradient(circle at top, rgba(79,140,255,.16), transparent 30%), var(--bg);
  color:var(--text);
}
.wrap{
  max-width:1200px;
  margin:0 auto;
  padding:24px;
}
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:16px;
  margin-bottom:18px;
}
h1{margin:0;font-size:28px}
.sub{color:var(--muted);margin-top:6px}
.grid{
  display:grid;
  grid-template-columns:1.2fr .8fr;
  gap:18px;
}
.card{
  background:linear-gradient(180deg,var(--panel),var(--panel2));
  border:1px solid var(--line);
  border-radius:20px;
  padding:18px;
  box-shadow:0 20px 60px rgba(0,0,0,.28);
}
.row{
  display:grid;
  grid-template-columns:2fr 1fr 1fr auto;
  gap:10px;
  margin-bottom:12px;
}
.input{
  width:100%;
  padding:12px 14px;
  border-radius:12px;
  border:1px solid var(--line);
  background:#0a1020;
  color:var(--text);
  outline:none;
}
.input:focus{
  border-color:rgba(79,140,255,.55);
  box-shadow:0 0 0 3px rgba(79,140,255,.12);
}
.btn{
  border:0;
  border-radius:12px;
  padding:12px 14px;
  cursor:pointer;
  font-weight:700;
}
.btn.primary{
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  color:#fff;
}
.btn.secondary{
  background:rgba(255,255,255,.07);
  color:var(--text);
  border:1px solid var(--line);
}
.btn.danger{
  background:rgba(255,93,108,.14);
  color:#ffd0d6;
  border:1px solid rgba(255,93,108,.22);
}
.table{
  width:100%;
  border-collapse:collapse;
  margin-top:14px;
}
.table th,.table td{
  text-align:left;
  padding:12px 10px;
  border-bottom:1px solid var(--line);
  vertical-align:middle;
}
.table th{
  color:var(--muted);
  font-size:13px;
  font-weight:700;
}
.right{text-align:right}
.summary{
  display:grid;
  gap:12px;
}
.sumbox{
  background:rgba(255,255,255,.04);
  border:1px solid var(--line);
  border-radius:16px;
  padding:14px;
}
.sumline{
  display:flex;
  justify-content:space-between;
  gap:12px;
  margin:8px 0;
}
.ok{color:var(--good)}
.warn{color:var(--bad)}
.list{
  display:grid;
  gap:10px;
  margin-top:10px;
  max-height:240px;
  overflow:auto;
}
.receipt{
  background:#0a1020;
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px;
  font-size:13px;
}
.small{font-size:12px;color:var(--muted)}
.flex{display:flex;gap:10px;flex-wrap:wrap}
@media (max-width:960px){
  .grid{grid-template-columns:1fr}
  .row{grid-template-columns:1fr 1fr}
}
@media (max-width:640px){
  .row{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div>
      <h1>Sistem Kasir</h1>
      <div class="sub">Tambah barang, hitung total, bayar, kembalian, dan riwayat transaksi.</div>
    </div>
    <div class="flex">
      <button class="btn secondary" id="loadSampleBtn" type="button">Isi Contoh</button>
      <button class="btn danger" id="clearAllBtn" type="button">Reset Transaksi</button>
    </div>
  </div>

  <div class="grid">
    <section class="card">
      <h2 style="margin:0 0 12px;">Input Barang</h2>
      <div class="row">
        <input id="itemName" class="input" placeholder="Nama barang" />
        <input id="itemPrice" class="input" type="number" min="0" placeholder="Harga" />
        <input id="itemQty" class="input" type="number" min="1" value="1" placeholder="Qty" />
        <button class="btn primary" id="addItemBtn" type="button">Tambah</button>
      </div>

      <table class="table">
        <thead>
          <tr>
            <th>Barang</th>
            <th class="right">Harga</th>
            <th class="right">Qty</th>
            <th class="right">Subtotal</th>
            <th class="right">Aksi</th>
          </tr>
        </thead>
        <tbody id="cartBody"></tbody>
      </table>

      <div class="sumline" style="margin-top:14px;">
        <span>Catatan</span>
        <span class="small">Sistem kasir sederhana berbasis browser</span>
      </div>
    </section>

    <aside class="card summary">
      <div class="sumbox">
        <h2 style="margin:0 0 8px;">Ringkasan</h2>
        <div class="sumline"><span>Item</span><strong id="itemCount">0</strong></div>
        <div class="sumline"><span>Total</span><strong id="totalText">Rp0</strong></div>
        <div class="sumline"><span>Bayar</span><strong id="paidText">Rp0</strong></div>
        <div class="sumline"><span>Kembalian</span><strong id="changeText" class="warn">Rp0</strong></div>
      </div>

      <div class="sumbox">
        <h3 style="margin:0 0 10px;">Pembayaran</h3>
        <input id="paidInput" class="input" type="number" min="0" placeholder="Masukkan nominal bayar" />
        <div class="flex" style="margin-top:10px;">
          <button class="btn primary" id="calcBtn" type="button">Hitung</button>
          <button class="btn secondary" id="saveBtn" type="button">Simpan</button>
        </div>
        <div id="payMsg" class="small" style="margin-top:10px;"></div>
      </div>

      <div class="sumbox">
        <h3 style="margin:0 0 10px;">Riwayat</h3>
        <div id="historyList" class="list"></div>
      </div>
    </aside>
  </div>
</div>

<script>
const cart = JSON.parse(localStorage.getItem('cashier_cart') || '[]');
const history = JSON.parse(localStorage.getItem('cashier_history') || '[]');

const itemName = document.getElementById('itemName');
const itemPrice = document.getElementById('itemPrice');
const itemQty = document.getElementById('itemQty');
const cartBody = document.getElementById('cartBody');
const itemCount = document.getElementById('itemCount');
const totalText = document.getElementById('totalText');
const paidText = document.getElementById('paidText');
const changeText = document.getElementById('changeText');
const paidInput = document.getElementById('paidInput');
const payMsg = document.getElementById('payMsg');
const historyList = document.getElementById('historyList');

function money(n){
  return 'Rp' + Number(n || 0).toLocaleString('id-ID');
}

function saveState(){
  localStorage.setItem('cashier_cart', JSON.stringify(cart));
  localStorage.setItem('cashier_history', JSON.stringify(history));
}

function renderCart(){
  cartBody.innerHTML = '';
  let total = 0;
  let items = 0;

  cart.forEach((item, index) => {
    const sub = item.price * item.qty;
    total += sub;
    items += item.qty;

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${item.name}</td>
      <td class="right">${money(item.price)}</td>
      <td class="right">${item.qty}</td>
      <td class="right">${money(sub)}</td>
      <td class="right"><button class="btn danger" data-index="${index}">Hapus</button></td>
    `;
    cartBody.appendChild(tr);
  });

  itemCount.textContent = items;
  totalText.textContent = money(total);

  const paid = Number(paidInput.value || 0);
  paidText.textContent = money(paid);
  const change = paid - total;
  changeText.textContent = money(change > 0 ? change : 0);
  changeText.className = change >= 0 ? 'ok' : 'warn';

  if(cart.length === 0){
    cartBody.innerHTML = '<tr><td colspan="5" class="small">Keranjang masih kosong.</td></tr>';
  }

  saveState();
}

function renderHistory(){
  historyList.innerHTML = '';
  if(history.length === 0){
    historyList.innerHTML = '<div class="small">Belum ada transaksi tersimpan.</div>';
    return;
  }

  history.slice().reverse().forEach(tx => {
    const div = document.createElement('div');
    div.className = 'receipt';
    div.innerHTML = `
      <div><strong>${tx.code}</strong></div>
      <div class="small">${tx.date}</div>
      <div style="margin-top:6px;">Item: ${tx.items}</div>
      <div>Total: ${money(tx.total)}</div>
      <div>Bayar: ${money(tx.paid)}</div>
      <div>Kembali: ${money(tx.change)}</div>
    `;
    historyList.appendChild(div);
  });
}

function addItem(){
  const name = itemName.value.trim();
  const price = Number(itemPrice.value);
  const qty = Number(itemQty.value || 1);

  if(!name || !price || price < 0 || !qty || qty < 1){
    payMsg.textContent = 'Isi nama, harga, dan qty dengan benar.';
    return;
  }

  cart.push({name, price, qty});
  itemName.value = '';
  itemPrice.value = '';
  itemQty.value = 1;
  payMsg.textContent = 'Barang ditambahkan.';
  renderCart();
}

function removeItem(index){
  cart.splice(index, 1);
  renderCart();
}

function calcPayment(){
  const total = cart.reduce((sum, item) => sum + item.price * item.qty, 0);
  const paid = Number(paidInput.value || 0);
  const change = paid - total;

  paidText.textContent = money(paid);
  changeText.textContent = money(change > 0 ? change : 0);
  changeText.className = change >= 0 ? 'ok' : 'warn';

  if(cart.length === 0){
    payMsg.textContent = 'Keranjang kosong.';
    return;
  }

  if(paid < total){
    payMsg.textContent = 'Uang bayar kurang.';
  }else{
    payMsg.textContent = 'Pembayaran cukup. Kembalian siap.';
  }
}

function saveTransaction(){
  if(cart.length === 0){
    payMsg.textContent = 'Keranjang kosong, tidak bisa simpan.';
    return;
  }

  const total = cart.reduce((sum, item) => sum + item.price * item.qty, 0);
  const paid = Number(paidInput.value || 0);

  if(paid < total){
    payMsg.textContent = 'Uang bayar kurang, transaksi belum bisa disimpan.';
    return;
  }

  const change = paid - total;
  const code = 'TX-' + Date.now().toString().slice(-6);

  history.push({
    code,
    date: new Date().toLocaleString('id-ID'),
    items: cart.reduce((sum, item) => sum + item.qty, 0),
    total,
    paid,
    change
  });

  cart.length = 0;
  paidInput.value = '';
  payMsg.textContent = 'Transaksi tersimpan.';
  renderCart();
  renderHistory();
}

function loadSample(){
  cart.push(
    {name:'Nasi Goreng', price:18000, qty:2},
    {name:'Es Teh', price:5000, qty:3}
  );
  renderCart();
}

function clearAll(){
  cart.length = 0;
  history.length = 0;
  paidInput.value = '';
  payMsg.textContent = '';
  localStorage.removeItem('cashier_cart');
  localStorage.removeItem('cashier_history');
  renderCart();
  renderHistory();
}

document.getElementById('addItemBtn').addEventListener('click', addItem);
document.getElementById('calcBtn').addEventListener('click', calcPayment);
document.getElementById('saveBtn').addEventListener('click', saveTransaction);
document.getElementById('loadSampleBtn').addEventListener('click', loadSample);
document.getElementById('clearAllBtn').addEventListener('click', clearAll);
paidInput.addEventListener('input', calcPayment);

cartBody.addEventListener('click', (e) => {
  if(e.target && e.target.dataset.index !== undefined){
    removeItem(Number(e.target.dataset.index));
  }
});

renderCart();
renderHistory();
</script>
</body>
</html>
